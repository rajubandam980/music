<div class="global-player">

  <!-- Left -->
  <div class="player-left">

    <img
      class="cover"
      [src]="playerService.currentSong?.imageUrl || 'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=200'"
      alt="cover">

    <div class="song-details">
      <h4>{{ playerService.currentSong?.title || 'No Song Playing' }}</h4>
      <p>{{ playerService.currentSong?.artist || 'Select a song' }}</p>
    </div>

  </div>

  <!-- Center -->
  <div class="player-center">

    <div class="controls">

      <button class="control-btn" (click)="playPrevious()">
        ⏮
      </button>

      <button class="play-btn" (click)="togglePlayPause()">
        {{ playerService.isPlaying ? '⏸' : '▶' }}
      </button>

      <button class="control-btn" (click)="playNext()">
        ⏭
      </button>

    </div>

    <div class="progress-wrapper">

      <span>{{ formatTime(currentTime) }}</span>

      <input
        type="range"
        min="0"
        [max]="duration"
        [value]="currentTime"
        (input)="seekAudio($event)"
        class="progress-bar">

      <span>{{ formatTime(duration) }}</span>

    </div>

  </div>

  <!-- Right -->
  <!-- <div class="player-right">

    <button class="right-btn">
      ❤️
    </button>

    <button class="right-btn">
      🔊
    </button>

  </div> -->

<audio
  #audioPlayer
  [src]="playerService.currentSong?.songUrl"
  (timeupdate)="updateProgress()"
  (loadedmetadata)="setDuration()"
  (ended)="playNext()">
</audio>

</div>
