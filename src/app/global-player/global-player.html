<div class="global-player" *ngIf="currentSong">

  <!-- Left -->
  <div class="player-left">

    <img
      [src]="currentSong.imageUrl || 'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=300'"
      class="album-cover"
      alt="Album">

    <div class="song-details">
      <h4>{{ currentSong.title }}</h4>
      <p>{{ currentSong.artist }}</p>
    </div>

  </div>

  <!-- Center -->
  <div class="player-center">

    <div class="controls">

      <button class="icon-btn" (click)="playPrevious()">
        ⏮
      </button>

      <button class="play-btn" (click)="togglePlayPause()">
        {{ isPlaying ? '⏸' : '▶' }}
      </button>

      <button class="icon-btn" (click)="playNext()">
        ⏭
      </button>

    </div>

    <div class="progress-container">

      <span>{{ formatTime(currentTime) }}</span>

      <input
        type="range"
        min="0"
        [max]="duration"
        [value]="currentTime"
        (input)="seek($event)"
        class="progress-bar">

      <span>{{ formatTime(duration) }}</span>

    </div>

  </div>

  <!-- Right -->
  <div class="player-right">

    🔊

    <input
      type="range"
      min="0"
      max="1"
      step="0.1"
      [value]="volume"
      (input)="changeVolume($event)"
      class="volume-slider">

  </div>

  <audio
    #audioPlayer
    (timeupdate)="updateProgress()"
    (loadedmetadata)="setDuration()"
    (ended)="playNext()">
  </audio>

</div>
