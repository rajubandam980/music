<div class="playlist-page">

  <h1 class="page-title">Playlists</h1>

  <!-- GRID -->
  <div class="playlist-grid" *ngIf="!selectedPlaylist">

    <div class="playlist-card"
         *ngFor="let pl of playlists"
         (click)="openPlaylist(pl)">

      <div class="playlist-image">
        <img [src]="pl.imageUrl" />
      </div>

      <div class="playlist-info">
        <h3>{{ pl.name }}</h3>
        <p>{{ pl.songs?.length || 0 }} Songs</p>
      </div>
<!-- 
      <button class="play-btn">
        ▶
      </button> -->

    </div>

  </div>

  <!-- DETAILS -->
  <div class="playlist-details" *ngIf="selectedPlaylist">

    <button class="back-btn" (click)="selectedPlaylist = null">
      ← Back
    </button>

    <h2>{{ selectedPlaylist.name }}</h2>

    <div class="song-list">

      <div class="song-card"
           *ngFor="let song of selectedPlaylist.songs"
           (click)="playSong(song)">

        <div class="song-left">

          <div class="song-avatar">🎧</div>

          <div class="song-text">
            <h3>{{ song.title }}</h3>
            <p>{{ song.artist }}</p>
          </div>

        </div>

        <button class="play-btn">
          ▶
        </button>

      </div>

    </div>

  </div>

</div>
