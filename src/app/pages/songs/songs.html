<div class="songs-page">

  <h1 class="page-title"></h1>

  <div class="song-list">

    <div class="song-card"
         *ngFor="let song of songs"
         (click)="playSong(song)">

      <!-- LEFT -->
      <div class="song-left">
<!-- 
        <div class="song-avatar">
          🎧
        </div> -->  

        <div class="song-text">
          <h3>{{ song.title }}</h3>
          <p>{{ song.artist }}</p>
        </div>

      </div>

      <!-- RIGHT PLAY BUTTON -->
      <button class="play-btn">
        ▶
      </button>

    </div>

  </div>

</div>
