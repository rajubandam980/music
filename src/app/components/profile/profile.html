<div class="profile-page">

  <div class="profile-card">

    <img
      src="https://i.pravatar.cc/150?img=12"
      alt="Profile"
      class="profile-image"
    >

    <h2>{{ user.name }}</h2>

    <p>{{ user.email }}</p>

    <div class="info-box">
      <strong>Favorite Genre:</strong>
      {{ user.favoriteGenre }}
    </div>

    <button>Edit Profile</button>

  </div>

</div>
